<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dnaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056CC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- DNA Helix Structure -->
  <!-- Left strand -->
  <path d="M15 10 Q20 20 15 30 Q10 40 15 50" 
        stroke="url(#dnaGradient)" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Right strand -->
  <path d="M45 10 Q40 20 45 30 Q50 40 45 50" 
        stroke="url(#dnaGradient)" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Connection lines (rungs) -->
  <line x1="15" y1="15" x2="45" y2="15" stroke="url(#dnaGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="25" x2="45" y2="25" stroke="url(#dnaGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="35" x2="45" y2="35" stroke="url(#dnaGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="45" x2="45" y2="45" stroke="url(#dnaGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Central helix core -->
  <circle cx="30" cy="20" r="2" fill="url(#dnaGradient)"/>
  <circle cx="30" cy="30" r="2" fill="url(#dnaGradient)"/>
  <circle cx="30" cy="40" r="2" fill="url(#dnaGradient)"/>
</svg>
