</filter>
</defs>
<rect width="1000" height="1000" fill="url(#bgN)"/>
<rect x="80" y="80" width="840" height="840" rx="50" fill="none" stroke="url(#qrN)" stroke-width="4" filter="url(#glowN)" opacity="0.6"/>
