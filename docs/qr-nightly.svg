<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bgN" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#0D001A"/>
<stop offset="100%" style="stop-color:#2A0845"/>
</linearGradient>
<linearGradient id="qrN" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#FF00FF"/>
<stop offset="50%" style="stop-color:#E100FF"/>
