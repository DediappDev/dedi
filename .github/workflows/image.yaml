on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"

name: Build Docker images

permissions:
  pull-requests: read
  contents: read
  packages: write

jobs:
  build_dev_image:
    name: Build development image
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    env:
      SSH_KEY: ${{ secrets.SSH_KEY }}

    steps:
      - name: Preflight required publish secrets
        id: preflight
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping image publish: DOCKERHUB_USERNAME/DOCKERHUB_TOKEN is missing."
            echo "can_push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup SSH agent (optional)
        if: ${{ env.SSH_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/dedi-web
            ghcr.io/${{ github.repository_owner }}/dedi-web
          tags: |
            type=ref,event=branch

      - name: Login to Docker Hub
        if: ${{ steps.preflight.outputs.can_push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: ${{ steps.preflight.outputs.can_push == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (with SSH)
        if: ${{ steps.preflight.outputs.can_push == 'true' && env.SSH_KEY != '' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: "linux/amd64,linux/arm64"
          cache-from: |
            type=gha
          cache-to: |
            type=gha
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          ssh: |
            default

      - name: Build and push image (without SSH)
        if: ${{ steps.preflight.outputs.can_push == 'true' && env.SSH_KEY == '' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: "linux/amd64,linux/arm64"
          cache-from: |
            type=gha
          cache-to: |
            type=gha
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build_release_image:
    name: Build release image
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: prod
    env:
      SSH_KEY: ${{ secrets.SSH_KEY }}

    steps:
      - name: Preflight required publish secrets
        id: preflight
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping image publish: DOCKERHUB_USERNAME/DOCKERHUB_TOKEN is missing."
            echo "can_push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup SSH agent (optional)
        if: ${{ env.SSH_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/dedi-web
            ghcr.io/${{ github.repository_owner }}/dedi-web
          tags: |
            type=ref,event=tag
            type=raw,value=release

      - name: Login to Docker Hub
        if: ${{ steps.preflight.outputs.can_push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: ${{ steps.preflight.outputs.can_push == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (with SSH)
        if: ${{ steps.preflight.outputs.can_push == 'true' && env.SSH_KEY != '' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: "linux/amd64,linux/arm64"
          cache-from: |
            type=gha
          cache-to: |
            type=gha
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          ssh: |
            default

      - name: Build and push image (without SSH)
        if: ${{ steps.preflight.outputs.can_push == 'true' && env.SSH_KEY == '' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: "linux/amd64,linux/arm64"
          cache-from: |
            type=gha
          cache-to: |
            type=gha
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
